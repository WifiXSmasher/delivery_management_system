{% extends 'transport/base.html' %}
{% block title %}{{ title }} - {{company.name}}{% endblock %}
{% block content %}
<div class="topbar no-print">
  <h5 class="page-title"><i class="bi bi-geo-alt me-2"></i>{{ title }}</h5>
  <a href="{% url 'stop_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="row"><div class="col-md-4">
<div class="card"><div class="card-body p-4">
  <form method="post">{% csrf_token %}
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Stop Name *</label>
        {{ form.name }}
        <div class="form-text">e.g. Kozhikode, Malappuram, Tirur</div>
      </div>
      <div class="col-12"><div class="form-check mt-1">{{ form.active }}<label class="form-check-label ms-2">Active</label></div></div>
    </div>
    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Stop</button>
      <a href="{% url 'stop_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div>
</div></div>
{% endblock %}
