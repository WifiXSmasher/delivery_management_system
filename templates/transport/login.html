<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ company.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('/static/images/{{ login_bg }}')
                        center center / cover no-repeat fixed;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 200px 20px 20px;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        /* Night theme — golden yellow */
        .theme-night .glass-card {
            background: rgba(255, 193, 7, 0.25);
            border: 1px solid rgba(255, 193, 7, 0.35);
        }
        .theme-night .glass-card h4 {
            color: #ffc107;
        }
        .theme-night .glass-card .form-label {
            color: #ffeeba;
        }
        .theme-night .glass-card .btn-primary {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            border-color: #e0a800;
            color: #1a1a00;
            font-weight: 600;
        }
        .theme-night .glass-card .btn-primary:hover {
            background: linear-gradient(135deg, #e0a800, #c69500);
            border-color: #c69500;
        }

        /* Day theme — teal green */
        .theme-day .glass-card {
            background: rgba(65, 255, 236, 0.55);
            border: 1px solid rgba(70, 235, 218, 0.6);
        }
        .theme-day .glass-card h4 {
            color: #ffffff;
        }
        .theme-day .glass-card .form-label {
            color: #004d40;
        }
        .theme-day .glass-card .btn-primary {
            background: linear-gradient(135deg, #009688, #00796b);
            border-color: #007769;
            color: #fff;
            font-weight: 600;
        }
        .theme-day .glass-card .btn-primary:hover {
            background: linear-gradient(135deg, #00796b, #00695c);
            border-color: #4fffea;
        }

        .company-title {
            text-align: center;
            color: white;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .login-box {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body class="theme-{{ login_theme }}">
<div style="position:fixed;top:0;left:0;right:0;text-align:center;padding:28px 0 12px;z-index:10;">
  <h2 style="color:#fff;font-weight:800;font-size:2rem;margin:0;text-shadow:0 3px 16px rgba(0,0,0,0.5);letter-spacing:1px;">{{ company.name }}<br><i class="bi bi-truck brand-icon"></i>     Delivery Management System</h2>
</div>
<div class="login-wrapper">
    <div class="login-box">

        

        <div class="card glass-card">
            <div class="card-body p-4">
                <h4 class="text-center fw-bold mb-4">
                    Sign In
                </h4>

                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}success{% endif %}">
                            {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            autofocus
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Login
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
